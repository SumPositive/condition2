name: Condition

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

options:
  bundleIdPrefix: com.azukid
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.1"
  swift: "6.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.azukid.AzBodyNote
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Condition:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Condition
    resources:
      - path: Condition/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azukid.AzBodyNote
        INFOPLIST_FILE: Condition/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    entitlements:
      path: Condition/Resources/Condition.entitlements
    info:
      path: Condition/Resources/Info.plist
      properties:
        CFBundleName: 体調メモ
        CFBundleDisplayName: 体調メモ
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCalendarsUsageDescription: 健康データをカレンダーに記録するために使用します。
        NSRemindersUsageDescription: 健康データのリマインダーに使用します。
        NSHealthShareUsageDescription: ヘルスケアの記録を読み取り、記録画面に自動入力するために使用します。
        NSHealthUpdateUsageDescription: 記録した健康データをヘルスケアアプリに書き込むために使用します。
        GADApplicationIdentifier: ca-app-pub-7576639777972199~8822933495
        NSUserTrackingUsageDescription: 広告の効果測定と改善のために使用します。

  ConditionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ConditionTests
    dependencies:
      - target: Condition

schemes:
  Condition:
    build:
      targets:
        Condition: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ConditionTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
